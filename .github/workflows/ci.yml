name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go build ./...
      - run: go vet ./...

  notify-lark:
    name: Notify Lark
    runs-on: ubuntu-latest
    needs: build
    if: always() && github.event_name == 'push'
    steps:
      - name: Determine status
        id: status
        run: |
          RESULT="${{ needs.build.result }}"
          if [[ "$RESULT" == "success" ]]; then
            echo "title=✅ arouter-go CI 成功" >> "$GITHUB_OUTPUT"
            echo "color=green" >> "$GITHUB_OUTPUT"
          else
            echo "title=❌ arouter-go CI 失败" >> "$GITHUB_OUTPUT"
            echo "color=red" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Lark notification
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          LARK_WEBHOOK_SECRET: ${{ secrets.LARK_WEBHOOK_SECRET }}
          BUILD_RESULT: ${{ needs.build.result }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          TIMESTAMP=$(date +%s)
          export TIMESTAMP
          SIGN=$(python3 - <<'PY'
          import base64
          import hashlib
          import hmac
          import os

          secret = os.environ["LARK_WEBHOOK_SECRET"]
          timestamp = os.environ["TIMESTAMP"]
          string_to_sign = f"{timestamp}\n{secret}".encode("utf-8")
          sign = base64.b64encode(
              hmac.new(string_to_sign, b"", digestmod=hashlib.sha256).digest()
          ).decode("utf-8")
          print(sign)
          PY
          )

          cat <<PAYLOAD | curl -s -X POST "$LARK_WEBHOOK_URL" -H "Content-Type: application/json" -d @-
          {
            "timestamp": "${TIMESTAMP}",
            "sign": "${SIGN}",
            "msg_type": "interactive",
            "card": {
              "header": {
                "title": {
                  "tag": "plain_text",
                  "content": "${{ steps.status.outputs.title }}"
                },
                "template": "${{ steps.status.outputs.color }}"
              },
              "elements": [
                {
                  "tag": "div",
                  "fields": [
                    { "is_short": true, "text": { "tag": "lark_md", "content": "**Repository**\narouter-go" } },
                    { "is_short": true, "text": { "tag": "lark_md", "content": "**Branch**\n${GITHUB_REF_NAME}" } }
                  ]
                },
                {
                  "tag": "div",
                  "fields": [
                    { "is_short": true, "text": { "tag": "lark_md", "content": "**CI**\n${BUILD_RESULT}" } },
                    { "is_short": true, "text": { "tag": "lark_md", "content": "**Commit**\n${SHORT_SHA}" } }
                  ]
                },
                {
                  "tag": "action",
                  "actions": [
                    {
                      "tag": "button",
                      "text": { "tag": "plain_text", "content": "查看 CI 详情" },
                      "url": "${RUN_URL}",
                      "type": "primary"
                    }
                  ]
                }
              ]
            }
          }
          PAYLOAD
